<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary-fixed-dim": "#aac7ff",
                    "tertiary": "#ffb691",
                    "tertiary-fixed": "#ffdbcb",
                    "error-container": "#93000a",
                    "on-tertiary-container": "#4a1b00",
                    "on-tertiary-fixed-variant": "#793100",
                    "secondary-container": "#c5020b",
                    "primary-fixed": "#d6e3ff",
                    "primary": "#aac7ff",
                    "tertiary-container": "#eb6a12",
                    "on-primary-fixed": "#001b3e",
                    "secondary-fixed": "#ffdad5",
                    "on-primary-container": "#002957",
                    "error": "#ffb4ab",
                    "surface-container-highest": "#353534",
                    "on-secondary-fixed-variant": "#930005",
                    "outline-variant": "#414754",
                    "background": "#131313",
                    "surface-variant": "#353534",
                    "surface-bright": "#3a3939",
                    "on-background": "#e5e2e1",
                    "secondary": "#ffb4aa",
                    "inverse-surface": "#e5e2e1",
                    "on-surface": "#e5e2e1",
                    "inverse-primary": "#005db8",
                    "tertiary-fixed-dim": "#ffb691",
                    "primary-container": "#3e90ff",
                    "surface-tint": "#aac7ff",
                    "on-error-container": "#ffdad6",
                    "surface-container-high": "#2a2a2a",
                    "on-primary": "#003064",
                    "on-tertiary-fixed": "#341100",
                    "on-surface-variant": "#c0c6d6",
                    "inverse-on-surface": "#313030",
                    "secondary-fixed-dim": "#ffb4aa",
                    "surface-container": "#201f1f",
                    "surface-container-lowest": "#0e0e0e",
                    "surface": "#131313",
                    "outline": "#8b91a0",
                    "on-secondary": "#690003",
                    "surface-container-low": "#1c1b1b",
                    "surface-dim": "#131313",
                    "on-error": "#690005",
                    "on-secondary-fixed": "#410001",
                    "on-secondary-container": "#ffd2cc",
                    "on-tertiary": "#552000",
                    "on-primary-fixed-variant": "#00468d"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "spacing": {
                    "stack-md": "16px",
                    "margin-mobile": "20px",
                    "section-gap": "32px",
                    "gutter-x": "16px",
                    "unit": "4px",
                    "stack-sm": "8px"
            },
            "fontFamily": {
                    "body-sm": ["Be Vietnam Pro"],
                    "label-caps": ["Be Vietnam Pro"],
                    "headline-md": ["Be Vietnam Pro"],
                    "body-lg": ["Be Vietnam Pro"],
                    "display-hero": ["Be Vietnam Pro"],
                    "headline-lg": ["Be Vietnam Pro"]
            },
            "fontSize": {
                    "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700"}],
                    "headline-md": ["22px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "body-lg": ["17px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "display-hero": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                    "headline-lg": ["28px", {"lineHeight": "34px", "letterSpacing": "-0.01em", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .video-container {
            height: 100vh;
            width: 100vw;
            background-color: black;
            overflow: hidden;
            position: relative;
        }
        .glass-panel {
            backdrop-filter: blur(25px);
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .custom-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            outline: none;
        }
        .custom-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            background: #0A84FF;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(10, 132, 255, 0.5);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-sm overflow-hidden">
<!-- Main Fullscreen Video Content -->
<div class="video-container flex items-center justify-center">
<video id="player" class="w-full h-full object-contain bg-black" playsinline preload="metadata"></video>
<!-- Gradient Overlay for Contrast -->
<div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-black/60 pointer-events-none"></div>
<!-- Top App Bar (Shared Component Style Mapping) -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-5 h-16 w-full bg-black/40 backdrop-blur-[25px] border-b border-white/10">
<div class="flex items-center gap-4">
<a href="/index.html" class="active:scale-95 duration-200 hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-on-surface" data-icon="arrow_back">arrow_back</span>
</a>
<div class="flex flex-col">
<span id="videoTitle" class="font-['Be_Vietnam_Pro'] font-bold tracking-tight text-on-surface text-body-lg">Loading...</span>
<span id="videoMeta" class="font-label-caps text-on-surface-variant uppercase text-[10px]">—</span>
</div>
</div>
<div class="flex items-center gap-5">
<button class="active:scale-95 duration-200 hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-on-surface" data-icon="subtitles">subtitles</span>
</button>
<button class="active:scale-95 duration-200 hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-on-surface" data-icon="settings">settings</span>
</button>
</div>
</header>
<!-- Centered Main Controls -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none">
<div class="flex items-center gap-12 pointer-events-auto">
<button id="rewindBtn" class="text-white/80 hover:text-white transition-all active:scale-90">
<span class="material-symbols-outlined text-[40px]">replay_10</span>
</button>
<button id="playBtn" class="w-20 h-20 glass-panel rounded-full flex items-center justify-center text-white hover:scale-105 active:scale-95 transition-all shadow-xl">
<span id="playIcon" class="material-symbols-outlined text-[48px]" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</button>
<button id="forwardBtn" class="text-white/80 hover:text-white transition-all active:scale-90">
<span class="material-symbols-outlined text-[40px]">forward_10</span>
</button>
</div>
</div>
<!-- Bottom Controls Glass Shell -->
<div class="fixed bottom-0 left-0 right-0 p-margin-mobile z-50">
<div class="max-w-4xl mx-auto glass-panel rounded-lg p-5 flex flex-col gap-5 shadow-[0_-10px_30px_rgba(0,0,0,0.5)]">
<!-- Seek Bar -->
<div class="flex flex-col gap-2">
<div class="flex justify-between text-[11px] font-label-caps text-on-surface-variant">
<span id="curTime">0:00</span>
<span id="remTime">-0:00</span>
</div>
<div id="seekBar" class="relative w-full h-3 flex items-center cursor-pointer">
<div class="absolute left-0 right-0 h-1 bg-white/20 rounded-full"></div>
<div id="seekFill" class="absolute left-0 h-1 bg-[#0A84FF] rounded-full shadow-[0_0_8px_#0A84FF]" style="width:0%"></div>
<div id="seekThumb" class="absolute -translate-x-1/2 w-4 h-4 bg-white rounded-full border-2 border-[#0A84FF] shadow-lg" style="left:0%"></div>
</div>
</div>
<!-- Control Bar Actions -->
<div class="flex items-center justify-between">
<div class="flex items-center gap-6">
<div class="flex items-center gap-3 group">
<button class="text-on-surface hover:text-[#0A84FF] transition-colors">
<span class="material-symbols-outlined" data-icon="volume_up">volume_up</span>
</button>
<input id="volSlider" class="custom-slider w-24 opacity-40 group-hover:opacity-100 transition-opacity" type="range" min="0" max="100" value="100"/>
</div>
</div>
<div class="flex items-center gap-8">
<button class="flex items-center gap-2 text-on-surface-variant hover:text-white transition-colors active:scale-95">
<span class="material-symbols-outlined" data-icon="layers">layers</span>
<span class="font-label-caps text-[11px]">EPISODES</span>
</button>
<button class="flex items-center gap-2 text-on-surface-variant hover:text-white transition-colors active:scale-95">
<span class="material-symbols-outlined" data-icon="speed">speed</span>
<span class="font-label-caps text-[11px]">1.0x</span>
</button>
<button id="fsBtn" class="text-on-surface hover:text-[#0A84FF] transition-colors active:scale-95">
<span class="material-symbols-outlined">fullscreen</span>
</button>
</div>
</div>
</div>
</div>
<!-- Notification/Toast Overlay (Example) -->
<div class="absolute top-24 left-1/2 -translate-x-1/2 px-4 py-2 glass-panel rounded-full flex items-center gap-2 pointer-events-none opacity-0 group-hover:opacity-100 transition-opacity duration-500">
<span class="material-symbols-outlined text-[14px] text-primary" data-icon="info" style="font-variation-settings: 'FILL' 1;">info</span>
<span class="text-body-sm font-medium text-white/90">HDR10+ Content Detected</span>
</div>
</div>
<!-- Navigation Suppressed as per Task Requirements for Transactional/Focused Journey -->
<!-- BottomNavBar and SideNav are hidden to prioritize the immersive player experience -->
<!-- Error overlay -->
<div id="errorOverlay" class="hidden fixed inset-0 z-[100] bg-black/80 flex items-center justify-center p-6">
  <div class="glass-panel rounded-lg p-6 max-w-sm text-center">
    <span class="material-symbols-outlined text-5xl text-error">error</span>
    <p id="errorMsg" class="mt-2 text-on-surface">Video tidak dapat dimuat</p>
    <a href="/index.html" class="inline-block mt-4 px-5 py-2 bg-[#0A84FF] text-white rounded-full font-bold">Kembali</a>
  </div>
</div>
<script type="module" src="/js/firebase.js"></script>
<script type="module" src="/js/watch.js"></script>
</body></html>
