<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Upload Video — STREAM</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: { extend: {
      colors: {
        "primary": "#aac7ff", "background": "#131313", "on-background": "#e5e2e1",
        "surface-container": "#201f1f", "surface-container-high": "#2a2a2a", "surface-container-highest": "#353534",
        "on-surface": "#e5e2e1", "on-surface-variant": "#c0c6d6", "outline": "#8b91a0",
        "error": "#ffb4ab", "error-container": "#93000a"
      },
      borderRadius: { DEFAULT: "1rem", lg: "2rem", xl: "3rem", full: "9999px" },
      spacing: { "stack-md":"16px","margin-mobile":"20px","section-gap":"32px","gutter-x":"16px","stack-sm":"8px" },
      fontFamily: { "body-sm":["Be Vietnam Pro"],"label-caps":["Be Vietnam Pro"],"headline-md":["Be Vietnam Pro"],"body-lg":["Be Vietnam Pro"],"display-hero":["Be Vietnam Pro"],"headline-lg":["Be Vietnam Pro"] },
      fontSize: {
        "body-sm":["14px",{"lineHeight":"20px","fontWeight":"400"}],
        "label-caps":["12px",{"lineHeight":"16px","letterSpacing":"0.05em","fontWeight":"700"}],
        "headline-md":["22px",{"lineHeight":"28px","fontWeight":"600"}],
        "body-lg":["17px",{"lineHeight":"24px","fontWeight":"400"}],
        "display-hero":["40px",{"lineHeight":"48px","letterSpacing":"-0.02em","fontWeight":"800"}],
        "headline-lg":["28px",{"lineHeight":"34px","letterSpacing":"-0.01em","fontWeight":"700"}]
      }
    }}
  }
</script>
<style>
  body { background:#131313; color:#e5e2e1; font-family:'Be Vietnam Pro', sans-serif; min-height:100dvh; }
  .glass-edge { border:1px solid rgba(255,255,255,0.15); }
  .progress-track { background: rgba(255,255,255,0.1); height: 8px; border-radius: 999px; overflow: hidden; }
  .progress-fill { background: #0A84FF; height: 100%; width: 0%; transition: width 200ms ease; box-shadow: 0 0 10px rgba(10,132,255,0.6); }
  .dropzone.drag-over { border-color:#0A84FF; background:rgba(10,132,255,0.05); }
</style>
</head>
<body class="bg-background text-on-background overflow-x-hidden">
<header class="fixed top-0 w-full z-50 bg-black/40 backdrop-blur-[25px] border-b border-white/10 flex justify-between items-center px-5 h-16">
  <div class="flex items-center gap-4">
    <a href="/index.html" class="active:scale-95 duration-200 hover:opacity-80 transition-opacity">
      <span class="material-symbols-outlined text-on-surface">arrow_back</span>
    </a>
    <span class="text-xl font-black tracking-widest text-[#0A84FF]">UPLOAD</span>
  </div>
</header>

<main class="pt-24 pb-32 px-margin-mobile max-w-2xl mx-auto space-y-section-gap">
  <section>
    <h1 class="font-display-hero text-headline-lg leading-tight">Bagikan video baru</h1>
    <p class="text-on-surface-variant mt-2">Maksimal 200MB. Format: MP4, WEBM, MOV.</p>
  </section>

  <!-- Title input -->
  <section class="space-y-stack-sm">
    <label class="font-label-caps text-on-surface-variant">JUDUL VIDEO</label>
    <input id="titleInput" type="text" maxlength="100" placeholder="Contoh: Sunset Timelapse 4K"
      class="w-full h-14 px-4 bg-surface-container-high rounded-lg glass-edge text-body-lg placeholder-outline focus:ring-2 focus:ring-[#0A84FF] focus:outline-none" />
  </section>

  <!-- Dropzone -->
  <section class="space-y-stack-sm">
    <label class="font-label-caps text-on-surface-variant">FILE VIDEO</label>
    <label id="dropzone" class="dropzone block cursor-pointer rounded-lg border-2 border-dashed border-white/15 bg-surface-container hover:bg-surface-container-high transition-all p-8 text-center">
      <input id="fileInput" type="file" accept="video/mp4,video/webm,video/quicktime,video/*" class="hidden"/>
      <span class="material-symbols-outlined text-5xl text-[#0A84FF]">cloud_upload</span>
      <p id="fileLabel" class="mt-2 text-body-lg">Tap untuk pilih video</p>
      <p class="text-label-caps text-on-surface-variant mt-1">atau drag & drop di sini</p>
    </label>
  </section>

  <!-- Preview -->
  <section id="previewSection" class="hidden space-y-stack-sm">
    <label class="font-label-caps text-on-surface-variant">THUMBNAIL PREVIEW</label>
    <div class="aspect-video rounded-lg overflow-hidden glass-edge bg-surface-container">
      <img id="thumbPreview" class="w-full h-full object-cover" alt="thumbnail"/>
    </div>
    <p id="fileMeta" class="text-label-caps text-on-surface-variant"></p>
  </section>

  <!-- Error -->
  <div id="errorBox" class="hidden p-4 rounded-lg bg-error-container/20 border border-error/40 text-error">
    <p id="errorText"></p>
  </div>

  <!-- Submit -->
  <button id="uploadBtn" disabled class="w-full bg-[#0A84FF] text-white py-4 rounded-lg font-headline-md flex items-center justify-center gap-2 active:scale-95 transition-transform disabled:opacity-40 disabled:active:scale-100">
    <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">upload</span>
    <span>Upload Video</span>
  </button>

  <p class="text-center text-label-caps text-on-surface-variant">Video akan dibagikan publik setelah upload selesai.</p>
</main>

<canvas id="thumbCanvas" class="hidden"></canvas>
<video id="thumbExtractor" class="hidden" muted playsinline crossorigin="anonymous"></video>

<script type="module" src="/js/firebase.js"></script>
<script type="module" src="/js/upload.js"></script>
</body></html>
